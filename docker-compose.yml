services:

  # ─────────────────────────────────────────
  # REST API + async jobs
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: parser-manager-api
    volumes:
      - ./src:/app/src:ro
      - ./input:/app/input
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: ["parser-manager-api"]

  # ─────────────────────────────────────────
  # CLI режим (одиночные запуски)
  # ─────────────────────────────────────────
  parser-cli:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: parser-manager-cli
    volumes:
      - ./src:/app/src:ro
      - ./input:/app/input
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    entrypoint: ["parser-manager"]
    command: ["--list-formats"]
    profiles:
      - cli

  # ─────────────────────────────────────────
  # Тесты
  # ─────────────────────────────────────────
  tests:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: parser-manager-tests
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    profiles:
      - test

  # ─────────────────────────────────────────
  # Dev окружение с полным доступом к коду
  # ─────────────────────────────────────────
  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: parser-manager-dev
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    stdin_open: true
    tty: true
    command: ["bash"]
    profiles:
      - dev
